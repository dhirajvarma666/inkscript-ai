<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InkScript AI • Login</title>

  <link rel="stylesheet" href="assets\css\login.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Josefin+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- TOPBAR -->

  <header class="topbar">

    <a href="index.html" class="back-btn">
      ← Back
    </a>

  </header>

  <!-- LOGIN -->

  <div class="login-wrapper">

    <div class="login-card">

      <h1>
        InkScript <span>AI</span>
      </h1>

      <p class="sub">
        Continue your handwritten creativity journey.
      </p>

      <form id="loginForm" novalidate>

        <div class="field">

          <label>Email Address</label>

          <input
            type="email"
            id="email"
            placeholder="Enter your email"
          >

          <span class="error" id="emailError"></span>

        </div>

        <div class="field">

          <label>Password</label>

          <input
            type="password"
            id="password"
            placeholder="Enter your password"
          >

          <span class="error" id="passwordError"></span>

        </div>

        <div class="remember-row">

          <label class="remember">

            <input type="checkbox" id="remember">

            <span>Remember Me</span>

          </label>

        </div>

        <button type="submit" class="login-btn">
          Login
        </button>

      </form>

    </div>

  </div>

  <script src="assets\js\login.js"></script>

</body>

</html>
