<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InkScript AI • Writing</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Josefin+Sans:wght@300;400;500;600;700&family=Caveat:wght@400;700&family=Indie+Flower&family=Architects+Daughter&family=Shadows+Into+Light&family=Just+Another+Hand&family=Gochi+Hand&family=Homemade+Apple&family=Dancing+Script:wght@400;700&family=Satisfy&family=Reenie+Beanie&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/writing.css">
</head>
<body>

<canvas id="particles-canvas"></canvas>

<header class="topbar">
  <div class="logo">InkScript <span>AI</span></div>

  <a href="index.html" class="back-btn">
    ← Back
  </a>
</header>

<section class="writing-layout">

  <!-- LEFT -->
  <aside class="controls-panel">

    <div class="panel-card">

      <div class="eyebrow">AI WRITING STUDIO</div>

      <h2>Create Clean Assignment Pages</h2>

      <!-- PAPER -->
      <div class="field">
        <label>Paper Type</label>

        <div class="option-row">
          <button class="toggle-btn active" data-paper="white">
            White
          </button>

          <button class="toggle-btn" data-paper="ruled">
            Ruled
          </button>
        </div>
      </div>

      <!-- INK -->
      <div class="field">
        <label>Ink Color</label>

        <div class="option-row">
          <button class="toggle-btn active" data-ink="#111111">
            Black
          </button>

          <button class="toggle-btn" data-ink="#143d8f">
            Blue
          </button>
        </div>
      </div>

      <!-- FONTS -->
      <div class="field">

        <label>Select Font</label>

        <div class="font-scroll" id="fontScroll">

          <button class="font-btn active" data-font="'Caveat', cursive" style="font-family:'Caveat'">Caveat</button>

          <button class="font-btn" data-font="'Architects Daughter', handwriting" style="font-family:'Architects Daughter'">Architects Daughter</button>

          <button class="font-btn" data-font="'Indie Flower', handwriting" style="font-family:'Indie Flower'">Indie Flower</button>

          <button class="font-btn" data-font="'Shadows Into Light', handwriting" style="font-family:'Shadows Into Light'">Shadows Into Light</button>

          <button class="font-btn" data-font="'Just Another Hand', handwriting" style="font-family:'Just Another Hand'">Just Another Hand</button>

          <button class="font-btn" data-font="'Gochi Hand', handwriting" style="font-family:'Gochi Hand'">Gochi Hand</button>

          <button class="font-btn" data-font="'Homemade Apple', handwriting" style="font-family:'Homemade Apple'">Homemade Apple</button>

          <button class="font-btn" data-font="'Dancing Script', cursive" style="font-family:'Dancing Script'">Dancing Script</button>

          <button class="font-btn" data-font="'Satisfy', cursive" style="font-family:'Satisfy'">Satisfy</button>

          <button class="font-btn" data-font="'Reenie Beanie', handwriting" style="font-family:'Reenie Beanie'">Reenie Beanie</button>

        </div>

      </div>

      <!-- ACTIONS -->
      <div class="action-row">

        <button class="ghost-btn" id="previewBtn">
          Preview
        </button>

        <button class="primary-btn" id="downloadBtn">
          Download PDF
        </button>

      </div>

    </div>

  </aside>

  <!-- RIGHT -->
  <main class="editor-side">

    <div class="editor-paper" id="paper">

      <div class="ruled-lines" id="ruledLines"></div>

      <textarea
        id="editor"
        spellcheck="false"
        placeholder="Enter your text..."
      ></textarea>

    </div>

  </main>

</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="assets/js/writing.js"></script>

</body>
</html>
